<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image"
      href="/assets/images/E_Favicon.png"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Eatable</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#877eff" />
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Preconnect to Cloudinary CDN so the first image request skips DNS+TLS -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <!-- Preload above-the-fold hero images on the landing page -->
    <link rel="preload" as="image" href="/assets/images/cheers.jpg" media="(max-width: 1023px)" />
    <link rel="preload" as="image" href="/assets/images/heroPhoto.JPG" media="(min-width: 1024px)" />
    <link rel="preload" as="image" href="/assets/images/Eatable_logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script
      type="module"
      src="/src/main.tsx"
    ></script>
  </body>
</html>
